<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glory's Pony Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            background: #1a1a2e;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: linear-gradient(180deg, #2d1b4e 0%, #1a1035 100%);
            border-right: 3px solid rgba(255,105,180,0.3);
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.collapsed {
            width: 52px;
        }

        .sidebar.collapsed .sidebar-content { opacity: 0; pointer-events: none; }
        .sidebar.collapsed .sidebar-header span { display: none; }
        .sidebar.collapsed .sidebar-header .toggle-icon { transform: rotate(180deg); }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 2px solid rgba(255,105,180,0.2);
            min-height: 56px;
        }

        .logo-text {
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #ff69b4, #87ceeb, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            white-space: nowrap;
            transition: opacity 0.2s;
        }

        .toggle-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: none;
            background: rgba(255,105,180,0.15);
            color: #ff69b4;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .toggle-btn:hover { background: rgba(255,105,180,0.3); }

        .toggle-icon { transition: transform 0.3s; }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            transition: opacity 0.2s;
            scrollbar-width: thin;
            scrollbar-color: #ff69b4 #2d1b4e;
        }

        .sidebar-content::-webkit-scrollbar { width: 5px; }
        .sidebar-content::-webkit-scrollbar-thumb { background: #ff69b4; border-radius: 3px; }

        .section {
            padding: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .section-title {
            font-family: 'Fredoka One', cursive;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff69b4;
            margin-bottom: 10px;
        }

        .bg-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .bg-card {
            aspect-ratio: 16/10;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            overflow: hidden;
            position: relative;
        }

        .bg-card:hover { border-color: rgba(255,105,180,0.5); transform: scale(1.03); }
        .bg-card.active { border-color: #ff69b4; box-shadow: 0 0 12px rgba(255,105,180,0.3); }

        .bg-card img, .bg-card .gradient-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bg-card .bg-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2px 0;
            text-align: center;
            color: white;
            font-size: 0.55rem;
            font-weight: 700;
            background: rgba(0,0,0,0.5);
        }

        .gradient-preview {
            background: linear-gradient(135deg, #fff 0%, #ffc0cb 20%, #ffe4b5 35%, #fffacd 50%, #90ee90 65%, #87ceeb 80%, #dda0dd 90%, #fff 100%);
            background-size: 300% 300%;
            animation: gradientShift 8s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .sticker-shelf {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .sticker-thumb {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.08);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        .sticker-thumb:hover {
            transform: scale(1.1) rotate(-3deg);
            border-color: #ff69b4;
            background: rgba(255,105,180,0.1);
        }

        .sticker-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .sticker-thumb .emoji-sticker {
            font-size: 22px;
        }

        .canvas {
            position: fixed;
            top: 0;
            left: 260px;
            right: 0;
            bottom: 0;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.collapsed ~ .canvas { left: 52px; }

        .canvas-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #fff 0%, #ffc0cb 20%, #ffe4b5 35%, #fffacd 50%, #90ee90 65%, #87ceeb 80%, #dda0dd 90%, #fff 100%);
            background-size: 300% 300%;
            animation: gradientShift 15s ease infinite;
        }

        .sticker {
            position: absolute;
            cursor: grab;
            user-select: none;
            z-index: 10;
            transition: filter 0.15s ease;
        }

        .sticker:hover { filter: drop-shadow(0 6px 16px rgba(0,0,0,0.4)); z-index: 50; }
        .sticker:active { cursor: grabbing; }

        .sticker.dragging {
            filter: drop-shadow(0 10px 24px rgba(0,0,0,0.5));
            transition: none;
            z-index: 100;
        }

        .sticker.selected {
            outline: 2px dashed #ff69b4;
            outline-offset: 6px;
        }

        .sticker .delete-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff4757;
            color: white;
            border: 2px solid #1a1035;
            font-size: 11px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 101;
            line-height: 1;
        }

        .sticker:hover .delete-btn { display: flex; }

        .toolbar {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(calc(-50% + 130px));
            z-index: 100;
            background: rgba(45,27,78,0.9);
            padding: 8px 18px;
            border-radius: 50px;
            backdrop-filter: blur(16px);
            border: 2px solid rgba(255,105,180,0.25);
            display: flex;
            gap: 10px;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar.collapsed ~ .toolbar { transform: translateX(calc(-50% + 26px)); }

        .toolbar-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toolbar-btn:hover { transform: scale(1.1); }

        .toolbar-btn.resize { background: rgba(135,206,235,0.2); color: #87ceeb; }
        .toolbar-btn.resize:hover { background: #87ceeb; color: #1a1a2e; }

        .toolbar-btn.dup { background: rgba(255,105,180,0.2); color: #ff69b4; }
        .toolbar-btn.dup:hover { background: #ff69b4; color: white; }

        .toolbar-btn.clear { background: rgba(255,71,87,0.2); color: #ff4757; }
        .toolbar-btn.clear:hover { background: #ff4757; color: white; }

        .sticker-count {
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 4px;
        }

        .toolbar-divider {
            width: 1px;
            height: 22px;
            background: rgba(255,255,255,0.1);
        }

        @media (max-width: 768px) {
            .sidebar { width: 52px; }
            .sidebar .sidebar-content { opacity: 0; pointer-events: none; }
            .sidebar .logo-text { display: none; }
            .canvas { left: 52px; }
            .toolbar { transform: translateX(calc(-50% + 26px)); }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo-text">Glory's Pony Studio</span>
            <button class="toggle-btn" id="toggleSidebar">
                <span class="toggle-icon">◀</span>
            </button>
        </div>
        <div class="sidebar-content">
            <div class="section">
                <div class="section-title">Backgrounds</div>
                <div class="bg-grid">
                    <div class="bg-card active" data-bg="gradient">
                        <div class="gradient-preview"></div>
                        <span class="bg-label">Rainbow</span>
                    </div>
                    <div class="bg-card" data-bg="mainstreet">
                        <img src="../mlp_fim_ponyville_mainstreet_by_bleukettu_d4vmwuk-pre.jpg" alt="Mainstreet">
                        <span class="bg-label">Mainstreet</span>
                    </div>
                    <div class="bg-card" data-bg="library">
                        <img src="../mlp_fim_twilight_s_library_by_bleukettu_d4vvh6r-pre.jpg" alt="Library">
                        <span class="bg-label">Library</span>
                    </div>
                    <div class="bg-card" data-bg="abbey">
                        <img src="abbey-road.webp" alt="Abbey Road">
                        <span class="bg-label">Abbey Road</span>
                    </div>
                    <div class="bg-card" data-bg="carealot">
                        <img src="carealot.jpg" alt="Care-a-lot">
                        <span class="bg-label">Care-a-lot</span>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Characters</div>
                <div class="sticker-shelf">
                    <div class="sticker-thumb" data-src="fluttershy-smirk.png" data-name="Fluttershy">
                        <img src="fluttershy-smirk.png" alt="Fluttershy">
                    </div>
                    <div class="sticker-thumb" data-src="twilight.png" data-name="Twilight Sparkle">
                        <img src="twilight.png" alt="Twilight Sparkle">
                    </div>
                    <div class="sticker-thumb" data-src="pinkie.webp" data-name="Pinkie Pie">
                        <img src="pinkie.webp" alt="Pinkie Pie">
                    </div>
                    <div class="sticker-thumb" data-src="applejack.webp" data-name="Applejack">
                        <img src="applejack.webp" alt="Applejack">
                    </div>
                    <div class="sticker-thumb" data-src="rarity.webp" data-name="Rarity">
                        <img src="rarity.webp" alt="Rarity">
                    </div>
                    <div class="sticker-thumb" data-src="rainbowdash.webp" data-name="Rainbow Dash">
                        <img src="rainbowdash.webp" alt="Rainbow Dash">
                    </div>
                    <div class="sticker-thumb" data-src="grumpy-bear.png" data-name="Grumpy Bear">
                        <img src="grumpy-bear.png" alt="Grumpy Bear">
                    </div>
                    <div class="sticker-thumb" data-src="cheer-bear.webp" data-name="Cheer Bear">
                        <img src="cheer-bear.webp" alt="Cheer Bear">
                    </div>
                    <div class="sticker-thumb" data-src="wish-bear.webp" data-name="Wish Bear">
                        <img src="wish-bear.webp" alt="Wish Bear">
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">Decorations</div>
                <div class="sticker-shelf">
                    <div class="sticker-thumb" data-emoji="🦋"><span class="emoji-sticker">🦋</span></div>
                    <div class="sticker-thumb" data-emoji="🌸"><span class="emoji-sticker">🌸</span></div>
                    <div class="sticker-thumb" data-emoji="✨"><span class="emoji-sticker">✨</span></div>
                    <div class="sticker-thumb" data-emoji="⭐"><span class="emoji-sticker">⭐</span></div>
                    <div class="sticker-thumb" data-emoji="🌈"><span class="emoji-sticker">🌈</span></div>
                    <div class="sticker-thumb" data-emoji="💖"><span class="emoji-sticker">💖</span></div>
                    <div class="sticker-thumb" data-emoji="🎀"><span class="emoji-sticker">🎀</span></div>
                    <div class="sticker-thumb" data-emoji="🍬"><span class="emoji-sticker">🍬</span></div>
                    <div class="sticker-thumb" data-emoji="🧁"><span class="emoji-sticker">🧁</span></div>
                    <div class="sticker-thumb" data-emoji="🍓"><span class="emoji-sticker">🍓</span></div>
                    <div class="sticker-thumb" data-emoji="🎵"><span class="emoji-sticker">🎵</span></div>
                    <div class="sticker-thumb" data-emoji="🌙"><span class="emoji-sticker">🌙</span></div>
                    <div class="sticker-thumb" data-emoji="☁️"><span class="emoji-sticker">☁️</span></div>
                    <div class="sticker-thumb" data-emoji="🌺"><span class="emoji-sticker">🌺</span></div>
                    <div class="sticker-thumb" data-emoji="🍀"><span class="emoji-sticker">🍀</span></div>
                    <div class="sticker-thumb" data-emoji="❤️"><span class="emoji-sticker">❤️</span></div>
                    <div class="sticker-thumb" data-emoji="💜"><span class="emoji-sticker">💜</span></div>
                    <div class="sticker-thumb" data-emoji="📖"><span class="emoji-sticker">📖</span></div>
                    <div class="sticker-thumb" data-emoji="🦋"><span class="emoji-sticker">🦋</span></div>
                    <div class="sticker-thumb" data-emoji="🌟"><span class="emoji-sticker">🌟</span></div>
                    <div class="sticker-thumb" data-emoji="🎈"><span class="emoji-sticker">🎈</span></div>
                    <div class="sticker-thumb" data-emoji="🍰"><span class="emoji-sticker">🍰</span></div>
                    <div class="sticker-thumb" data-emoji="👑"><span class="emoji-sticker">👑</span></div>
                    <div class="sticker-thumb" data-emoji="💫"><span class="emoji-sticker">💫</span></div>
                    <div class="sticker-thumb" data-emoji="🌻"><span class="emoji-sticker">🌻</span></div>
                    <div class="sticker-thumb" data-emoji="🍎"><span class="emoji-sticker">🍎</span></div>
                    <div class="sticker-thumb" data-emoji="💎"><span class="emoji-sticker">💎</span></div>
                    <div class="sticker-thumb" data-emoji="⚡"><span class="emoji-sticker">⚡</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="canvas" id="canvas">
        <div class="canvas-gradient" id="canvasGradient"></div>
    </div>

    <div class="toolbar">
        <button class="toolbar-btn resize" id="sizeDown" title="Smaller">−</button>
        <button class="toolbar-btn resize" id="sizeUp" title="Bigger">+</button>
        <div class="toolbar-divider"></div>
        <button class="toolbar-btn dup" id="duplicate" title="Duplicate">⧉</button>
        <button class="toolbar-btn dup" id="fullscreen" title="Fullscreen">⛶</button>
        <div class="toolbar-divider"></div>
        <button class="toolbar-btn clear" id="clearAll" title="Clear all">✕</button>
        <span class="sticker-count"><span id="count">0</span></span>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const canvasGradient = document.getElementById('canvasGradient');
        const sidebar = document.getElementById('sidebar');
        let activeSticker = null;
        let offsetX, offsetY;
        let selectedSticker = null;

        document.getElementById('toggleSidebar').addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });

        const bgStyles = {
            gradient: { show: true, bg: '' },
            mainstreet: { show: false, bg: "url('../mlp_fim_ponyville_mainstreet_by_bleukettu_d4vmwuk-pre.jpg')" },
            library: { show: false, bg: "url('../mlp_fim_twilight_s_library_by_bleukettu_d4vvh6r-pre.jpg')" },
            abbey: { show: false, bg: "url('abbey-road.webp')" },
            carealot: { show: false, bg: "url('carealot.jpg')" }
        };

        document.querySelectorAll('.bg-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.bg-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                const style = bgStyles[card.dataset.bg];
                if (style.show) {
                    canvasGradient.style.display = 'block';
                    canvas.style.background = '';
                } else {
                    canvasGradient.style.display = 'none';
                    canvas.style.background = style.bg;
                    canvas.style.backgroundSize = 'cover';
                    canvas.style.backgroundPosition = 'center';
                }
            });
        });

        document.querySelectorAll('.sticker-thumb').forEach(thumb => {
            thumb.addEventListener('click', () => {
                addSticker(thumb.dataset.src, thumb.dataset.emoji, thumb.dataset.name || 'sticker');
            });
        });

        function addSticker(src, emoji, name, x, y, size) {
            const el = document.createElement('div');
            el.className = 'sticker';

            if (src) {
                const img = document.createElement('img');
                img.src = src;
                img.alt = name;
                img.draggable = false;
                img.style.width = (size || 180) + 'px';
                el.appendChild(img);
            } else if (emoji) {
                el.innerHTML = `<span style="font-size: ${size || 72}px; line-height: 1;">${emoji}</span>`;
            }

            const del = document.createElement('button');
            del.className = 'delete-btn';
            del.textContent = '×';
            del.addEventListener('click', (e) => {
                e.stopPropagation();
                el.remove();
                if (selectedSticker === el) selectedSticker = null;
                updateCount();
            });
            el.appendChild(del);

            const canvasRect = canvas.getBoundingClientRect();
            el.style.left = (x ?? (Math.random() * (canvasRect.width - (size || 180)))) + 'px';
            el.style.top = (y ?? (Math.random() * (canvasRect.height - (size || 180)))) + 'px';

            el.addEventListener('click', (e) => {
                e.stopPropagation();
                selectSticker(el);
            });

            el.addEventListener('pointerdown', (e) => {
                if (e.target.classList.contains('delete-btn')) return;
                activeSticker = el;
                const rect = el.getBoundingClientRect();
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;
                el.classList.add('dragging');
                el.setPointerCapture(e.pointerId);
                selectSticker(el);
                e.preventDefault();
            });

            canvas.appendChild(el);
            updateCount();
            return el;
        }

        function selectSticker(el) {
            if (selectedSticker) selectedSticker.classList.remove('selected');
            selectedSticker = el;
            el.classList.add('selected');
        }

        document.addEventListener('pointermove', (e) => {
            if (!activeSticker) return;
            const canvasRect = canvas.getBoundingClientRect();
            activeSticker.style.left = (e.clientX - canvasRect.left - offsetX) + 'px';
            activeSticker.style.top = (e.clientY - canvasRect.top - offsetY) + 'px';
        });

        document.addEventListener('pointerup', () => {
            if (activeSticker) {
                activeSticker.classList.remove('dragging');
                activeSticker = null;
            }
        });

        canvas.addEventListener('click', () => {
            if (selectedSticker) {
                selectedSticker.classList.remove('selected');
                selectedSticker = null;
            }
        });

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        document.getElementById('clearAll').addEventListener('click', () => {
            if (canvas.querySelectorAll('.sticker').length === 0) return;
            canvas.querySelectorAll('.sticker').forEach(s => s.remove());
            selectedSticker = null;
            updateCount();
        });

        document.getElementById('duplicate').addEventListener('click', () => {
            if (!selectedSticker) return;
            const img = selectedSticker.querySelector('img');
            const emoji = selectedSticker.querySelector('span');
            const l = parseInt(selectedSticker.style.left) + 30;
            const t = parseInt(selectedSticker.style.top) + 30;
            if (img) addSticker(img.src, null, img.alt, l, t, img.offsetWidth);
            else if (emoji) addSticker(null, emoji.textContent, 'emoji', l, t, emoji.offsetWidth);
        });

        document.getElementById('sizeUp').addEventListener('click', () => {
            if (!selectedSticker) return;
            const img = selectedSticker.querySelector('img');
            const emoji = selectedSticker.querySelector('span');
            if (img) img.style.width = Math.min(img.offsetWidth + 40, 500) + 'px';
            if (emoji) emoji.style.fontSize = Math.min(parseInt(emoji.style.fontSize) + 20, 200) + 'px';
        });

        document.getElementById('sizeDown').addEventListener('click', () => {
            if (!selectedSticker) return;
            const img = selectedSticker.querySelector('img');
            const emoji = selectedSticker.querySelector('span');
            if (img) img.style.width = Math.max(img.offsetWidth - 40, 40) + 'px';
            if (emoji) emoji.style.fontSize = Math.max(parseInt(emoji.style.fontSize) - 20, 20) + 'px';
        });

        function updateCount() {
            document.getElementById('count').textContent = canvas.querySelectorAll('.sticker').length;
        }

        setTimeout(() => {
            addSticker('fluttershy-smirk.png', null, 'Fluttershy', 120, 100, 220);
            addSticker('twilight.png', null, 'Twilight Sparkle', null, null, 220);
        }, 100);
    </script>
</body>
</html>
